<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аналитика</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav class="nav">
        <a href="{{ url_for('dashboard') }}">Главная</a>
        <a href="{{ url_for('userinfo') }}">Профиль</a>
        <a href="{{ url_for('logout') }}">Выйти</a>
    </nav>
    <main class="container">
        <h1>Графики и диаграммы</h1>
        <div class="chart-wrap">
            <h2>Точность на валидации от эпох</h2>
            <canvas id="chartEpochs"></canvas>
        </div>
        <div class="chart-wrap">
            <h2>Количество записей по классам (обучение)</h2>
            <canvas id="chartClassCounts"></canvas>
        </div>
        <div class="chart-wrap">
            <h2>Топ-5 классов в валидационной выборке</h2>
            <canvas id="chartValidTop5"></canvas>
        </div>
        <div class="chart-wrap">
            <h2>Точность по записям тестового набора</h2>
            <p class="hint">Загрузите тестовый набор на главной странице, затем обновите страницу после загрузки.</p>
            <canvas id="chartPerRecord"></canvas>
        </div>
    </main>
    <script>
        function fetchJson(url) {
            return fetch(url, { credentials: "same-origin" }).then(function(r) { return r.json(); });
        }
        fetchJson("{{ url_for('api_epochs') }}").then(function(data) {
            var ctx = document.getElementById("chartEpochs").getContext("2d");
            new Chart(ctx, {
                type: "line",
                data: {
                    labels: data.epochs || [],
                    datasets: [{ label: "Val accuracy", data: data.val_accuracy || [], borderColor: "#4a90d9", fill: false }]
                },
                options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 0, max: 1 } } }
            });
        });
        fetchJson("{{ url_for('api_class_counts') }}").then(function(data) {
            var labels = Object.keys(data).map(Number).sort(function(a,b){return a-b;}).map(String);
            var values = labels.map(function(k) { return data[k] || 0; });
            var ctx = document.getElementById("chartClassCounts").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{ label: "Записей", data: values, backgroundColor: "rgba(74,144,217,0.6)" }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        });
        fetchJson("{{ url_for('api_valid_top5') }}").then(function(data) {
            var labels = Object.keys(data).map(String);
            var values = labels.map(function(k) { return data[k] || 0; });
            var ctx = document.getElementById("chartValidTop5").getContext("2d");
            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{ label: "Количество", data: values, backgroundColor: "rgba(76,175,80,0.6)" }]
                },
                options: { responsive: true, maintainAspectRatio: true }
            });
        });
        var perRecordData = window.sessionStorage.getItem("testPerRecord");
        if (perRecordData) {
            try {
                var arr = JSON.parse(perRecordData);
                var labels = arr.map(function(_, i) { return String(i + 1); });
                var ctx = document.getElementById("chartPerRecord").getContext("2d");
                new Chart(ctx, {
                    type: "bar",
                    data: {
                        labels: labels,
                        datasets: [{ label: "Верно (1) / Неверно (0)", data: arr, backgroundColor: arr.map(function(v) { return v ? "rgba(76,175,80,0.6)" : "rgba(244,67,54,0.6)"; }) }]
                    },
                    options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 0, max: 1 } } }
                });
            } catch (e) {}
        }
    </script>
</body>
</html>
