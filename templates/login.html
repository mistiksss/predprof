<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-box">
        <h1>Классификация радиосигналов</h1>
        <form method="POST" action="{{ url_for('login') }}" class="form">
            {{ form.hidden_tag() }}
            <div class="field">
                <label>Логин</label>
                {{ form.username(class="input") }}
            </div>
            <div class="field">
                <label>Пароль</label>
                {{ form.password(class="input") }}
            </div>
            <button type="submit" class="btn btn-primary">{{ form.submit.label.text }}</button>
        </form>
    </div>
</body>
</html>
